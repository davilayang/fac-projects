services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-main}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-main}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: localhost:5000/arxiv-rag-api:${TAG:-latest}
    container_name: arxiv-rag-api
    restart: unless-stopped
    # Port not exposed to host — nginx proxies internally
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      OPENAI_KEY: ${OPENAI_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HF_TOKEN: ${HF_TOKEN}
      RERANK_CACHE_DIR: /opt/models
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SQL_ECHO: ${SQL_ECHO:-false}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      ALLOWED_GITHUB_ORG: ${ALLOWED_GITHUB_ORG:-}
      COOKIE_SECURE: "true"
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-vertuvian}
    volumes:
      - rerank_models:/opt/models
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: arxiv-rag-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api

  certbot:
    image: certbot/certbot
    container_name: arxiv-rag-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Check for renewal every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"

volumes:
  postgres_data:
  certbot_conf:
  certbot_www:
  rerank_models:
