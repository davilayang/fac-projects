server {
    listen 80;
    server_name arxiv-rag.45weeks.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name arxiv-rag.45weeks.com;

    ssl_certificate     /etc/letsencrypt/live/arxiv-rag.45weeks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arxiv-rag.45weeks.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                   always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    # Proxy to the app
    # Use Docker's internal resolver so nginx starts even if api is not yet up.
    resolver 127.0.0.11 valid=10s;
    set $api http://api:8000;

    location / {
        proxy_pass         $api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE streaming — disable buffering
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     300s;
        proxy_connect_timeout  60s;
    }
}
