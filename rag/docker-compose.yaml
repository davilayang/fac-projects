# Dagster server infrastructure for RAG ingestion pipeline.
#
# Usage:
#   docker compose up
#   docker compose down --volumes
#
# UI:  http://localhost:3000
#
# Code changes require a restart:
#   docker compose restart dagster-code
#
# For local dev with auto-reload, skip Docker and use: uv run poe dev

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: ${DAGSTER_PG_USERNAME}
      POSTGRES_PASSWORD: ${DAGSTER_PG_PASSWORD}
      POSTGRES_DB: ${DAGSTER_PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dagster-code:
    image: python:3.13-slim
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - code_venv:/app/.docker-venv
    working_dir: /app
    environment:
      UV_PROJECT_ENVIRONMENT: /app/.docker-venv
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_USERNAME: ${DAGSTER_PG_USERNAME}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD}
      DAGSTER_PG_DB: ${DAGSTER_PG_DB}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install uv --quiet &&
        uv sync --frozen --quiet &&
        uv run dagster code-server start -h 0.0.0.0 -p 4000 -m pipeline.definitions
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "/app/.docker-venv/bin/dagster api grpc-health-check -p 4000"]
      timeout: 1s
      interval: 5s
      retries: 20
      start_period: 30s
    restart: on-failure

  dagster-webserver:
    image: python:3.13-slim
    depends_on:
      postgres:
        condition: service_healthy
      dagster-code:
        condition: service_healthy
    environment:
      DAGSTER_HOME: /opt/dagster/home
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_USERNAME: ${DAGSTER_PG_USERNAME}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD}
      DAGSTER_PG_DB: ${DAGSTER_PG_DB}
    volumes:
      - ./dagster.yaml:/opt/dagster/home/dagster.yaml:ro
      - ./workspace.yaml:/opt/dagster/home/workspace.yaml:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install dagster dagster-webserver dagster-postgres --quiet &&
        dagster-webserver -h 0.0.0.0 -p 3000 -w /opt/dagster/home/workspace.yaml
    ports:
      - "3000:3000"
    restart: unless-stopped

  dagster-daemon:
    image: python:3.13-slim
    depends_on:
      postgres:
        condition: service_healthy
      dagster-code:
        condition: service_healthy
    environment:
      DAGSTER_HOME: /opt/dagster/home
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_USERNAME: ${DAGSTER_PG_USERNAME}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD}
      DAGSTER_PG_DB: ${DAGSTER_PG_DB}
    volumes:
      - ./dagster.yaml:/opt/dagster/home/dagster.yaml:ro
      - ./workspace.yaml:/opt/dagster/home/workspace.yaml:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install dagster dagster-postgres --quiet &&
        dagster-daemon run -w /opt/dagster/home/workspace.yaml
    restart: on-failure

volumes:
  postgres_data:
  code_venv:
