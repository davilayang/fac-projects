# Dagster server infrastructure for RAG ingestion pipeline.
#
# Usage:
#   docker compose up
#   docker compose down --volumes
#
# UI:  http://localhost:5000
#
# Code changes require a restart:
#   docker compose restart dagster-code
#
# For local dev with auto-reload, skip Docker and use: uv run poe dev

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: ${DAGSTER_PG_USERNAME}
      POSTGRES_PASSWORD: ${DAGSTER_PG_PASSWORD}
      POSTGRES_DB: ${DAGSTER_PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dagster_network
    restart: unless-stopped

  dagster-code:
    build:
      context: .
      dockerfile: docker/dagster-code/Dockerfile
    image: rag_pipeline_code
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DAGSTER_POSTGRES_USER: ${DAGSTER_PG_USERNAME}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_PG_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_PG_DB}
      DAGSTER_CURRENT_IMAGE: rag_pipeline_code
    volumes:
      - ./data:/app/data
    ports:
      - "4000:4000"
    networks:
      - dagster_network
    healthcheck:
      test: ["CMD", "/app/.venv/bin/dagster", "api", "grpc-health-check", "-p", "4000"]
      timeout: 1s
      interval: 5s
      retries: 20
      start_period: 30s
    restart: on-failure

  dagster-webserver:
    build:
      context: .
      dockerfile: docker/dagster/Dockerfile
    entrypoint:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "5000"
      - -w
      - /opt/dagster/home/workspace.yaml
    depends_on:
      postgres:
        condition: service_healthy
      dagster-code:
        condition: service_healthy
    environment:
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_USERNAME: ${DAGSTER_PG_USERNAME}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD}
      DAGSTER_PG_DB: ${DAGSTER_PG_DB}
    ports:
      - "${APP_HOST:-127.0.0.1}:5000:5000"
    networks:
      - dagster_network
    restart: unless-stopped

  dagster-daemon:
    build:
      context: .
      dockerfile: docker/dagster/Dockerfile
    entrypoint:
      - dagster-daemon
      - run
      - -w
      - /opt/dagster/home/workspace.yaml
    depends_on:
      postgres:
        condition: service_healthy
      dagster-code:
        condition: service_healthy
    environment:
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_USERNAME: ${DAGSTER_PG_USERNAME}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD}
      DAGSTER_PG_DB: ${DAGSTER_PG_DB}
    networks:
      - dagster_network
    restart: on-failure

  pgweb:
    image: sosedoff/pgweb
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGWEB_DATABASE_URL: postgresql://${DAGSTER_PG_USERNAME}:${DAGSTER_PG_PASSWORD}@postgres:5432/${DAGSTER_PG_DB}?sslmode=disable
    ports:
      - "${APP_HOST:-127.0.0.1}:8081:8081"
    networks:
      - dagster_network
    restart: unless-stopped

networks:
  dagster_network:
    driver: bridge
    name: dagster_network

volumes:
  postgres_data:
