server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /auth requests to the auth-server service.
    # In k8s the service name resolves via cluster DNS.
    # AUTH_SERVER_URL is substituted at container startup via envsubst
    # if you need runtime configuration; for now it points to the k8s
    # service name "auth-server" on port 4000.
    location /auth {
        proxy_pass         http://auth-server:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # React Router — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
