name: eva

services:

  # ── Auth server ─────────────────────────────────────────────────────────────
  auth-server:
    image: eva-auth-server
    build:
      context: ./auth-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET}
      AUTH_CALLBACK_URL: ${AUTH_CALLBACK_URL}
      UI_ORIGIN: ${UI_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    volumes:
      # Persist session files across container restarts
      - auth-sessions:/app/sessions
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── UI ───────────────────────────────────────────────────────────────────────
  ui:
    image: eva-ui
    build:
      context: ./ui
      args:
        VITE_AGENT_NAME: ${VITE_AGENT_NAME:-eva}
        VITE_APIVIDEO_API_KEY: ${VITE_APIVIDEO_API_KEY}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      auth-server:
        condition: service_healthy
      voice-agent:
        condition: service_healthy

  # ── Voice agent ──────────────────────────────────────────────────────────────
  voice-agent:
    image: eva-voice-agent
    build:
      context: ./voice-agent
    restart: unless-stopped
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      INWORLD_API_KEY: ${INWORLD_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  auth-sessions:
